<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUDS Nutrition Scorer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <!-- header -->
        <div class="header">
            <h1>🍽 HUDS Nutrition Scorer</h1>
            <p>Analyze any Harvard Dining recipe instantly</p>
        </div>

        <!-- error message if no recipe found -->
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <!-- search form -->
        <form action="/search" method="POST" class="search-form">

            <input
                type     = "text"
                name     = "recipe_name"
                placeholder = "e.g. Boom Sauce, Kale Bowl, Caesar Salad..."
                required
            >

            <p class="label">Dietary preferences:</p>
            <div class="checkboxes">
                <label><input type="checkbox" name="vegan">       Vegan</label>
                <label><input type="checkbox" name="vegetarian">  Vegetarian</label>
                <label><input type="checkbox" name="gluten_free"> Gluten-Free</label>
                <label><input type="checkbox" name="nut_free">    Nut-Free</label>
            </div>

            <button type="submit">Search Recipe</button>

        </form>

    </div>

</body>
</html>
